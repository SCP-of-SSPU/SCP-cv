{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block page_title %}SCP-cv 大屏内容播放系统{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
  <script defer src="{% static 'js/app.js' %}"></script>
</head>
<body class="app-shell">
  <header class="topbar">
    <div class="topbar__brand">
      <div class="brand-mark" aria-hidden="true">S</div>
      <div>
        <p class="eyebrow">{{ project_name }}</p>
        <h1>{% block title %}播放控制台{% endblock %}</h1>
      </div>
    </div>
    <div class="topbar__meta">
      <span class="chip chip--neutral">{{ runtime_mode }}</span>
      <span class="chip chip--accent">gRPC {{ grpc_endpoint }}</span>
    </div>
  </header>

  <nav class="toolbar" aria-label="快捷操作">
    <button class="toolbar__button toolbar__button--primary" type="button" onclick="stopPlayback()">停止播放</button>
    <button class="toolbar__button" type="button" onclick="refreshPage()">刷新页面</button>
    <span class="toolbar__status" id="sse-status">SSE: 连接中…</span>
  </nav>

  <main class="content">
    <div class="banner" data-banner id="global-banner" style="display: none;"></div>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span>HTTP 仅处理本地操作，gRPC 保留给外部程序接入。</span>
    <span data-clock>--</span>
  </footer>
</body>
</html>
