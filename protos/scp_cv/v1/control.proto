syntax = "proto3";

package scp_cv.v1;

import "google/protobuf/struct.proto";

// ──────────────────────────────────────────────────────────────
// PlaybackControlService — SCP-cv 统一播放控制 gRPC 服务
//
// 该服务随 Django 进程启动（django-socio-grpc 共宿主），默认端口 50051。
// 外部系统（中控、自动化脚本等）通过本服务远程操控大屏播放内容。
//
// 功能分组：
//   源管理     — 打开 / 关闭媒体源（PPT、视频、WebRTC 流等）
//   播放控制   — 播放、暂停、停止
//   内容导航   — PPT 翻页、视频/音频时间跳转
//   状态查询   — 运行时概览、详细播放状态
//   显示器管理 — 查询可用屏幕、切换单屏/拼接模式
// ──────────────────────────────────────────────────────────────
service PlaybackControlService {

  // ── 源管理 ──

  // 打开指定媒体源并开始播放。
  // 通过 media_source_id 指定要打开的 MediaSource 记录。
  // 若当前已有播放中的源，会先自动关闭再打开新源。
  rpc OpenSource(OpenSourceRequest) returns (OperationReply);

  // 关闭当前正在播放的媒体源。
  // 将播放状态归零，播放器窗口回到待命状态。
  // 无需指定 ID，始终作用于当前活跃的源。
  rpc CloseSource(CloseSourceRequest) returns (OperationReply);

  // ── 播放控制 ──

  // 对当前源执行播放/暂停/停止操作。
  // 已有源打开时有效；无活跃源时返回错误。
  rpc ControlPlayback(ControlPlaybackRequest) returns (OperationReply);

  // ── 内容导航 ──

  // PPT 翻页（上/下/跳转指定页）或 视频/音频时间跳转。
  // 仅在相应源类型激活时生效：PPT 支持 NEXT/PREV/GOTO，
  // 视频/音频支持 SEEK；源类型不匹配的动作会被忽略。
  rpc NavigateContent(NavigateContentRequest) returns (OperationReply);

  // ── 状态查询 ──

  // 获取系统运行时概览（当前源类型、播放状态、显示模式、gRPC 地址等）。
  // 适合中控面板轮询或健康检查使用。
  rpc GetRuntimeStatus(WindowRequest) returns (RuntimeStatusReply);

  // 获取详细播放状态，包含 PPT 页码、视频进度等子类型特有信息。
  // 比 GetRuntimeStatus 更完整，适合需要渲染进度条/页码的客户端。
  rpc GetPlaybackState(WindowRequest) returns (PlaybackStateReply);

  // ── 显示器管理 ──

  // 列出当前主机上所有可用显示器及其分辨率、坐标信息。
  // 同时返回自动拼接标签（如 "Display 1 + Display 2"）。
  rpc ListDisplayTargets(EmptyRequest) returns (DisplayTargetsReply);

  // 切换显示目标：可选 single（单屏）或 left_right_splice（左右拼接）。
  // 切换后播放器窗口会自动重新定位到目标屏幕。
  rpc SelectDisplayTarget(SelectDisplayTargetRequest) returns (OperationReply);

  // ── 源管理（CRUD） ──

  // 列出所有可用媒体源。可选按类型过滤。
  rpc ListSources(ListSourcesRequest) returns (ListSourcesReply);

  // 通过本地文件路径注册媒体源（文件上传保留 HTTP 端点）。
  rpc AddLocalPathSource(AddLocalPathSourceRequest) returns (SourceReply);

  // 通过 URL 添加网页类型媒体源。
  rpc AddWebUrlSource(AddWebUrlSourceRequest) returns (SourceReply);

  // 更新媒体源可编辑字段（名称、网页 URL、预热开关）。
  rpc UpdateSource(UpdateSourceRequest) returns (SourceReply);

  // 删除指定媒体源。
  rpc DeleteSource(DeleteSourceRequest) returns (OperationReply);

  // ── 扩展播放控制 ──

  // 切换指定窗口的循环播放模式。
  rpc ToggleLoop(ToggleLoopRequest) returns (OperationReply);

  // 触发所有窗口显示 5 秒窗口 ID 叠加标识。
  rpc ShowWindowIds(EmptyRequest) returns (OperationReply);

  // ── 扩展状态查询 ──

  // 获取所有窗口的播放会话快照列表。
  rpc GetAllSessionSnapshots(EmptyRequest) returns (AllSessionSnapshotsReply);

  // ── 实时推送（替代 SSE） ──

  // 服务端流式推送播放状态变更，客户端通过此 RPC 代替 SSE 订阅实时更新。
  rpc WatchPlaybackState(EmptyRequest) returns (stream PlaybackStateEvent);

  // ── 预案管理 ──

  // 获取所有预案列表。
  rpc ListScenarios(EmptyRequest) returns (ListScenariosReply);

  // 创建新预案。
  rpc CreateScenario(ScenarioDetail) returns (ScenarioReply);

  // 更新已有预案。
  rpc UpdateScenario(UpdateScenarioRequest) returns (ScenarioReply);

  // 删除预案。
  rpc DeleteScenario(DeleteScenarioRequest) returns (OperationReply);

  // 激活预案：一键应用预设的窗口配置。
  rpc ActivateScenario(ActivateScenarioRequest) returns (ActivateScenarioReply);

  // 从当前窗口 1/2 播放状态捕获预案；scenario_id > 0 时覆盖已有预案。
  rpc CaptureScenario(CaptureScenarioRequest) returns (ScenarioReply);

  // ── 兼容接口 ──

  // 停止当前播放内容（等价于 CloseSource，保留供旧版客户端调用）。
  rpc StopCurrentContent(EmptyRequest) returns (OperationReply);
}


// ══════════════════════════════════════════════════════════════
// 枚举定义
// ══════════════════════════════════════════════════════════════

// 媒体源类型，与 Django 侧 MediaSource.source_type 字段对应。
// 客户端可根据此类型决定可用的导航动作和 UI 控件。
enum SourceType {
  SOURCE_UNKNOWN = 0;        // 未知 / 默认值
  SOURCE_PPT = 1;            // PowerPoint 演示文稿（.pptx / .ppt / .ppsx）
  SOURCE_VIDEO = 2;          // 视频文件（.mp4 / .mkv / .avi 等）
  SOURCE_AUDIO = 3;          // 音频文件（.mp3 / .flac / .wav 等）
  SOURCE_IMAGE = 4;          // 图片文件（.png / .jpg / .svg 等）
  SOURCE_WEB = 5;            // 网页内容（预留，待实现）
  SOURCE_CUSTOM_STREAM = 6;  // 自定义流（预留，待实现）
  SOURCE_RTSP_STREAM = 7;  // RTSP 实时流（通过 MediaMTX RTSP 拉流，已迁移至 SRT）
  SOURCE_SRT_STREAM = 8;   // SRT 实时流（通过 MediaMTX SRT 直接拉流，低延迟）
}

// 播放控制动作，传入 ControlPlaybackRequest.action 字段。
enum PlaybackAction {
  ACTION_UNKNOWN = 0;  // 未知 / 默认值
  ACTION_PLAY = 1;     // 开始或恢复播放
  ACTION_PAUSE = 2;    // 暂停播放（可恢复）
  ACTION_STOP = 3;     // 停止播放（回到起始位置）
}

// 内容导航动作，传入 NavigateContentRequest.action 字段。
// PPT 源使用 NEXT / PREV / GOTO；视频/音频源使用 SEEK。
enum NavigateAction {
  NAV_UNKNOWN = 0;  // 未知 / 默认值
  NAV_NEXT = 1;     // 下一页 / 下一项
  NAV_PREV = 2;     // 上一页 / 上一项
  NAV_GOTO = 3;     // 跳转到指定页（配合 target_index 使用）
  NAV_SEEK = 4;     // 跳转到指定时间位置（配合 position_ms 使用）
}


// ══════════════════════════════════════════════════════════════
// 请求消息
// ══════════════════════════════════════════════════════════════

// 空请求，用于无参数的 RPC（GetRuntimeStatus、GetPlaybackState、
// ListDisplayTargets、StopCurrentContent）。
message EmptyRequest {}

// 按窗口查询请求（GetPlaybackState、GetRuntimeStatus 等需要指定窗口）
message WindowRequest {
  int32 window_id = 1;  // 目标窗口编号（1-4，0 表示全部或默认窗口 1）
}

// 打开媒体源请求。
// media_source_id 对应数据库中 MediaSource 表的主键，
// 可通过 HTTP GET /api/sources/ 接口查询可用的源列表。
message OpenSourceRequest {
  int64 media_source_id = 1;    // MediaSource 主键（必填）
  bool autoplay = 2;            // 是否打开后立即播放（默认 false，建议传 true）
  int32 window_id = 3;          // 目标窗口编号（1-4，0 表示默认窗口 1）
}

// 关闭当前媒体源请求。
// 始终作用于当前活跃源，无需指定任何 ID。
message CloseSourceRequest {
  int32 window_id = 1;          // 目标窗口编号（1-4，0 表示默认窗口 1）
}

// 播放控制请求。
message ControlPlaybackRequest {
  PlaybackAction action = 1;    // 要执行的动作（PLAY / PAUSE / STOP）
  int32 window_id = 2;          // 目标窗口编号（1-4，0 表示默认窗口 1）
}

// 内容导航请求。
// 根据 action 类型填写对应字段：
//   NAV_NEXT / NAV_PREV — 无需额外参数
//   NAV_GOTO          — 填写 target_index（页码从 1 开始）
//   NAV_SEEK           — 填写 position_ms（毫秒）
message NavigateContentRequest {
  NavigateAction action = 1;    // 导航动作类型
  int32 target_index = 2;       // NAV_GOTO: 目标页码（从 1 开始，其他动作忽略此字段）
  int64 position_ms = 3;        // NAV_SEEK: 目标播放位置（毫秒，其他动作忽略此字段）
  int32 window_id = 4;          // 目标窗口编号（1-4，0 表示默认窗口 1）
}

// 切换显示目标请求。
message SelectDisplayTargetRequest {
  // 显示模式："single"（单屏）或 "left_right_splice"（左右拼接）
  string display_mode = 1;
  // 目标显示器名称（单屏模式）或拼接标签（拼接模式）。
  // 可通过 ListDisplayTargets 获取可用名称。
  string target_label = 2;
  int32 window_id = 3;          // 目标窗口编号（1-4，0 表示默认窗口 1）
}


// ══════════════════════════════════════════════════════════════
// 响应消息
// ══════════════════════════════════════════════════════════════

// 通用操作结果响应，用于所有返回 OperationReply 的 RPC。
message OperationReply {
  bool success = 1;     // 操作是否成功
  string message = 2;   // 人类可读的概要信息（如 "播放已开始"）
  string detail = 3;    // 异常时的详细信息（正常时为空串）
}

// 运行时状态概览响应（GetRuntimeStatus）。
// 提供系统当前的核心状态快照，适合中控面板轮询。
message RuntimeStatusReply {
  string source_type = 1;       // 当前源类型（如 "PPT" / "VIDEO" / "WEBRTC_STREAM"，无源时为空串）
  string source_name = 2;       // 当前源名称（如文件名或流标识）
  string playback_state = 3;    // 播放状态（"IDLE" / "PLAYING" / "PAUSED" / "STOPPED"）
  string display_mode = 4;      // 显示模式（"single" / "left_right_splice"）
  string grpc_endpoint = 5;     // 当前 gRPC 服务地址（如 "127.0.0.1:50051"）
  bool debug_mode = 6;          // 是否为调试模式（对应 DJANGO_DEBUG 配置）
}

// 详细播放状态响应（GetPlaybackState）。
// 包含所有源类型特有的进度字段，客户端根据 source_type 选择性读取。
message PlaybackStateReply {
  string playback_state = 1;    // 播放状态（"IDLE" / "PLAYING" / "PAUSED" / "STOPPED"）
  string source_type = 2;       // 源类型代码
  string source_name = 3;       // 源名称
  string source_uri = 4;        // 源 URI（文件路径或 WHEP URL）
  int32 current_slide = 5;      // PPT 当前页码（从 1 开始；非 PPT 源时为 0）
  int32 total_slides = 6;       // PPT 总页数（非 PPT 源时为 0）
  int64 position_ms = 7;        // 视频/音频当前播放位置（毫秒；无进度时为 0）
  int64 duration_ms = 8;        // 视频/音频总时长（毫秒；无时长时为 0）
  string display_mode = 9;      // 显示模式（"single" / "left_right_splice"）
  string target_display = 10;   // 当前目标显示器名称
  bool is_spliced = 11;         // 是否处于拼接模式
  bool loop_enabled = 12;       // 是否启用循环播放
}

// 单个显示器信息（ListDisplayTargets 响应中的重复元素）。
message DisplayTargetItem {
  int32 index = 1;       // 显示器索引（从 0 开始）
  string name = 2;       // 显示器名称（如 "Display 1"、"\\.\DISPLAY2"）
  int32 width = 3;       // 水平分辨率（像素）
  int32 height = 4;      // 垂直分辨率（像素）
  int32 x = 5;           // 左上角 X 坐标（虚拟桌面坐标系）
  int32 y = 6;           // 左上角 Y 坐标（虚拟桌面坐标系）
  bool is_primary = 7;   // 是否为主显示器
}

// 显示器列表响应（ListDisplayTargets）。
message DisplayTargetsReply {
  repeated DisplayTargetItem targets = 1;  // 所有可用显示器
  string splice_label = 2;                 // 自动生成的拼接标签（如 "Display 1 + Display 2"）
}


// ══════════════════════════════════════════════════════════════
// 源管理消息
// ══════════════════════════════════════════════════════════════

// 列出媒体源请求（ListSources）。
message ListSourcesRequest {
  string source_type = 1;  // 可选：按源类型过滤（如 "ppt", "video"），空串表示全部
}

// 单个媒体源信息（ListSourcesReply 响应中的重复元素）。
message SourceItem {
  int64 id = 1;                  // MediaSource 主键
  string source_type = 2;       // 源类型代码
  string name = 3;              // 显示名称
  string uri = 4;               // 资源路径或 URL
  bool is_available = 5;        // 是否可用
  string stream_identifier = 6; // 流标识符（仅流类型有值）
  string created_at = 7;        // 创建时间 ISO 格式
  int64 folder_id = 8;          // 所属文件夹 ID（0 表示根目录）
  string original_filename = 9; // 原始文件名
  int64 file_size = 10;         // 文件大小（字节）
  string mime_type = 11;        // MIME 类型
  bool is_temporary = 12;       // 是否为临时源
  string expires_at = 13;       // 临时源过期时间 ISO 格式
  google.protobuf.Struct metadata = 14; // 源扩展元数据
  bool keep_alive = 15;         // 网页源是否保持活跃
  bool preheat_enabled = 16;    // 网页源是否启用预热
  string preview_url = 17;      // 预览资源 URL
  string thumbnail_url = 18;    // 缩略图 URL
  string preview_kind = 19;     // 预览类型（image / video / icon）
  string preview_label = 20;    // 预览兜底标签
}

// 媒体源列表响应（ListSources）。
message ListSourcesReply {
  bool success = 1;
  repeated SourceItem sources = 2;
}

// 通过本地路径添加媒体源请求（AddLocalPathSource）。
message AddLocalPathSourceRequest {
  string path = 1;           // 本地文件绝对路径（必填）
  string name = 2;           // 显示名称（可选，默认用文件名）
  string source_type = 3;    // 源类型（可选，默认自动检测）
  optional int64 folder_id = 4; // 所属文件夹 ID（可选）
}

// 通过 URL 添加网页媒体源请求（AddWebUrlSource）。
message AddWebUrlSourceRequest {
  string url = 1;            // 网页 URL（必填）
  string name = 2;           // 显示名称（可选，默认用 URL）
  optional bool preheat_enabled = 3; // 是否启用网页预热（可选，默认 true）
  optional bool keep_alive = 4;      // 旧字段兼容；preheat_enabled 优先
  optional int64 folder_id = 5;      // 所属文件夹 ID（可选）
}

// 媒体源操作响应（AddLocalPathSource、AddWebUrlSource）。
message SourceReply {
  bool success = 1;
  string message = 2;
  SourceItem source = 3;     // 创建成功的源信息
}

// 更新媒体源请求（UpdateSource）。
message UpdateSourceRequest {
  int64 media_source_id = 1;       // 要更新的 MediaSource 主键
  optional string name = 2;        // 新显示名称；未传则不修改
  optional string uri = 3;         // 新 URI；仅网页源可修改
  optional bool preheat_enabled = 4; // 是否启用网页预热；未传则不修改
  optional bool keep_alive = 5;      // 旧字段兼容；preheat_enabled 优先
}

// 删除媒体源请求（DeleteSource）。
message DeleteSourceRequest {
  int64 media_source_id = 1; // 要删除的 MediaSource 主键
}


// ══════════════════════════════════════════════════════════════
// 扩展播放控制消息
// ══════════════════════════════════════════════════════════════

// 切换循环播放请求（ToggleLoop）。
message ToggleLoopRequest {
  int32 window_id = 1;  // 目标窗口编号（1-4）
  bool enabled = 2;      // 是否启用循环播放
}

// ══════════════════════════════════════════════════════════════
// 扩展状态查询消息
// ══════════════════════════════════════════════════════════════

// 单窗口播放会话快照（AllSessionSnapshotsReply 中的重复元素）。
message SessionSnapshot {
  int32 window_id = 1;
  int64 session_id = 2;
  string source_name = 3;
  string source_type = 4;
  string source_type_label = 5;
  string source_uri = 6;
  string playback_state = 7;
  string playback_state_label = 8;
  string display_mode = 9;
  string display_mode_label = 10;
  string target_display_label = 11;
  string spliced_display_label = 12;
  bool is_spliced = 13;
  int32 current_slide = 14;
  int32 total_slides = 15;
  int64 position_ms = 16;
  int64 duration_ms = 17;
  string pending_command = 18;
  string last_updated_at = 19;
  bool loop_enabled = 20;
}

// 所有窗口播放会话快照列表响应（GetAllSessionSnapshots）。
message AllSessionSnapshotsReply {
  bool success = 1;
  repeated SessionSnapshot sessions = 2;
}


// ══════════════════════════════════════════════════════════════
// 预案管理消息
// ══════════════════════════════════════════════════════════════

// 预案窗口配置槽位（窗口 1 或 2 的媒体源与播放参数）。
message ScenarioWindowSlot {
  int64 source_id = 1;    // 媒体源 ID（0 表示无源）
  bool autoplay = 2;      // 是否自动播放
  bool resume = 3;        // 相同源已打开时是否保留进度
  string source_name = 4; // 媒体源显示名称（列表展示用）
}

// 预案详细信息（创建 / 更新时发送）。
message ScenarioDetail {
  string name = 1;                    // 预案名称（必填）
  string description = 2;            // 描述（可选）
  ScenarioWindowSlot window1 = 4;    // 窗口 1 配置
  ScenarioWindowSlot window2 = 5;    // 窗口 2 配置
}

// 预案摘要项（列表响应中的重复元素）。
message ScenarioItem {
  int64 id = 1;
  string name = 2;
  string description = 3;
  ScenarioWindowSlot window1 = 5;
  ScenarioWindowSlot window2 = 6;
  string created_at = 7;     // ISO 8601 时间戳
  string updated_at = 8;
}

// 预案列表响应（ListScenarios）。
message ListScenariosReply {
  bool success = 1;
  repeated ScenarioItem scenarios = 2;
}

// 更新预案请求（UpdateScenario）。
message UpdateScenarioRequest {
  int64 scenario_id = 1;     // 目标预案 ID
  ScenarioDetail detail = 2; // 更新内容
}

// 删除预案请求（DeleteScenario）。
message DeleteScenarioRequest {
  int64 scenario_id = 1;
}

// 激活预案请求（ActivateScenario）。
message ActivateScenarioRequest {
  int64 scenario_id = 1;
}

// 从当前播放状态捕获预案请求（scenario_id 为 0 时创建新预案）。
message CaptureScenarioRequest {
  string name = 1;
  string description = 2;
  int64 scenario_id = 3;
}

// 预案操作响应（CreateScenario、UpdateScenario）。
message ScenarioReply {
  bool success = 1;
  string message = 2;
  ScenarioItem scenario = 3;
}

// 激活预案响应（ActivateScenario）。
message ActivateScenarioReply {
  bool success = 1;
  string message = 2;
  repeated SessionSnapshot sessions = 3;  // 激活后的窗口状态快照
}


// ══════════════════════════════════════════════════════════════
// 实时推送消息
// ══════════════════════════════════════════════════════════════

// 播放状态变更事件（WatchPlaybackState 流式响应元素）。
message PlaybackStateEvent {
  string event_type = 1;                // 事件类型（如 "playback_state"）
  int64 sequence = 2;                   // 事件序列号
  repeated SessionSnapshot sessions = 3; // 更新后的会话快照列表
  double timestamp = 4;                 // UNIX 时间戳
}
